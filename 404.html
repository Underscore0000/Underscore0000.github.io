<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Segment not found</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  body{ display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
  .err-code{ font-family:var(--font-mono); font-size: clamp(4rem, 14vw, 9rem); color: var(--accent); line-height:1; }
  .err-wrap{ max-width: 520px; padding: var(--sp-5); }
</style>
</head>
<body>
  <div class="err-wrap">
    <div class="eyebrow" style="justify-content:center;">Segmentation fault</div>
    <div class="err-code mono">0x404</div>
    <h1 style="font-size:1.6rem;margin:16px 0 10px;">Page not found in memory</h1>
    <p style="margin-bottom:28px;">This address doesn't map to anything on this site. It may have moved or never existed.</p>
    <a href="index.html" class="btn btn-primary"><i class="bi bi-arrow-left"></i> Return to base</a>
  </div>
</body>
</html>
